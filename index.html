<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Payroll Terminal</title>

<style>
    body {
        background: black;
        color: #00ff00;
        font-family: monospace;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .container {
        width: 800px;
        border: 2px solid #00ff00;
        padding: 15px;
    }

    #terminal {
        height: 400px;
        overflow-y: auto;
        white-space: pre-line;
        margin-bottom: 10px;
    }

    /* 🔲 Input box style */
    .input-box {
        display: flex;
        border: 2px solid #00ff00;
        padding: 8px;
    }

    .prompt {
        margin-right: 5px;
    }

    input {
        flex: 1;
        background: black;
        color: #00ff00;
        border: none;
        outline: none;
        font-family: monospace;
        font-size: 16px;
    }
</style>
</head>

<body>

<div class="container">
    <div id="terminal"></div>

    <!-- 🔲 Boxed input -->
    <div class="input-box">
        <span class="prompt">></span>
        <input type="text" id="input" autofocus placeholder="Enter choice...">
    </div>
</div>
