<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Employee Payroll</title>

<style>
body {
    margin: 0;
    font-family: "Courier New", monospace;
    background: #050505;
    color: #00ff88;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    width: 90%;
    max-width: 1100px;
}

h1 {
    text-align: center;
    color: #00ffcc;
    text-shadow: 0 0 15px #00ffcc;
}

.terminal {
    background: black;
    border: 2px solid #00ff88;
    padding: 20px;
    height: 420px;
    overflow-y: auto;
    border-radius: 12px;
    box-shadow: 0 0 25px #00ff88;
    font-size: 18px;
    line-height: 1.6;
}

.menu {
    margin-top: 15px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

button {
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(135deg, #00ffcc, #0099ff);
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    transform: scale(1.05);
}

.input-area {
    margin-top: 10px;
}

input {
    width: 200px;
    padding: 8px;
    margin: 5px;
    border-radius: 5px;
    border: none;
}

.success { color: #00ffcc; }
.error { color: #ff4d4d; }
.info { color: #00aaff; }

</style>
</head>

<body>

<div class="container">
    <h1>💼 Employee Payroll</h1>

    <div class="terminal" id="terminal"></div>

    <div class="menu">
        <button onclick="showAdd()">Add</button>
        <button onclick="showUpdate()">Update OT</button>
        <button onclick="showPayslip()">Payslip</button>
        <button onclick="totalPayout()">Total</button>
        <button onclick="highestPaid()">Highest</button>
        <button onclick="exitApp()">Exit</button>
    </div>

    <div class="input-area" id="inputs"></div>
</div>

<script>
let employees = [];
const terminal = document.getElementById("terminal");

/* Print */
function print(text, type="") {
    let line = document.createElement("div");
    line.className = type;
    terminal.appendChild(line);

    let i = 0;
    function typeWriter() {
        if (i < text.length) {
            line.innerHTML += text[i++];
            setTimeout(typeWriter, 15);
        }
    }
    typeWriter();
    terminal.scrollTop = terminal.scrollHeight;
}

/* Menu */
function showMenu() {
    print("\n--- Payroll System ---");
    print("1. Add Employee");
    print("2. Update OT");
    print("3. Generate Payslip");
    print("4. Total Payout");
    print("5. Highest Paid");
    print("6. Exit\n");
}

/* ✅ CLEAR INPUT BOX */
function clearInputs() {
    document.getElementById("inputs").innerHTML = "";
}

/* Forms */
function showAdd() {
    clearInputs();
    showMenu();
    print(">> Add Employee");

    document.getElementById("inputs").innerHTML = `
        <input id="id" placeholder="ID">
        <input id="name" placeholder="Name">
        <input id="basic" placeholder="Basic">
        <input id="ot" placeholder="OT">
        <button onclick="addEmployee()">Submit</button>
    `;
}

function showUpdate() {
    clearInputs();
    showMenu();
    print(">> Update OT");

    document.getElementById("inputs").innerHTML = `
        <input id="id" placeholder="ID">
        <input id="ot" placeholder="New OT">
        <button onclick="updateOT()">Update</button>
    `;
}

function showPayslip() {
    clearInputs();
    showMenu();
    print(">> Generate Payslip");

    document.getElementById("inputs").innerHTML = `
        <input id="id" placeholder="ID">
        <button onclick="generatePayslip()">Generate</button>
    `;
}

/* Logic */
function addEmployee() {
    let id = document.getElementById("id").value;
    let name = document.getElementById("name").value;
    let basic = parseFloat(document.getElementById("basic").value);
    let ot = parseInt(document.getElementById("ot").value);

    if (!id || !name || isNaN(basic) || isNaN(ot)) {
        print("Invalid input!", "error");
        return;
    }

    employees.push({id, name, basic, ot});

    print(`✔ Employee Added! (ID: ${id}, Name: ${name})`, "success");
}

function calculateGross(e) {
    return e.basic + e.ot * 200;
}

function calculateTax(g) {
    if (g < 20000) return g * 0.05;
    else if (g <= 50000) return g * 0.10;
    else return g * 0.20;
}

function generatePayslip() {
    let id = document.getElementById("id").value;
    let e = employees.find(emp => emp.id == id);

    if (!e) {
        print("✖ Employee not found!", "error");
        return;
    }

    let g = calculateGross(e);
    let t = calculateTax(g);
    let n = g - t;

    print("\n--- Payslip ---");
    print("Name: " + e.name);
    print("Gross: " + g);
    print("Tax: " + t);
    print("Net: " + n, "success");
}

function updateOT() {
    let id = document.getElementById("id").value;
    let ot = parseInt(document.getElementById("ot").value);

    let e = employees.find(emp => emp.id == id);

    if (!e) {
        print("✖ Employee not found!", "error");
        return;
    }

    e.ot = ot;
    print("✔ OT Updated!", "success");
}

function totalPayout() {
    clearInputs();   // ✅ FIX

    showMenu();

    let total = employees.reduce((sum, e) => {
        let g = calculateGross(e);
        return sum + (g - calculateTax(g));
    }, 0);

    print("💰 Total Payout: " + total, "success");
}

function highestPaid() {
    clearInputs();   // ✅ FIX

    showMenu();

    if (employees.length === 0) {
        print("No employees!", "error");
        return;
    }

    let max = employees.reduce((a, b) => {
        let na = calculateGross(a) - calculateTax(calculateGross(a));
        let nb = calculateGross(b) - calculateTax(calculateGross(b));
        return na > nb ? a : b;
    });

    print("🏆 Highest Paid: " + max.name + " (ID: " + max.id + ")", "success");
}

function exitApp() {
    clearInputs();   // ✅ FIX
    print("Exiting system...");
}

/* Initial */
showMenu();
</script>

</body>
</html>
