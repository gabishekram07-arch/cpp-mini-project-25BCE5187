<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Employee Payroll</title>

<style>
body {
    margin: 0;
    font-family: monospace;
    background: #0a0a0a;
    color: #00ff88;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Container */
.container {
    width: 85%;
    max-width: 1000px;
}

/* Title */
h1 {
    text-align: center;
    color: #00ffcc;
    text-shadow: 0 0 10px #00ffcc;
}

/* Terminal */
.terminal {
    background: black;
    border: 2px solid #00ff88;
    padding: 20px;
    height: 400px;
    overflow-y: auto;
    box-shadow: 0 0 20px #00ff88;
    border-radius: 10px;
    white-space: pre-line;

    font-size: 18px;
    line-height: 1.6;
    letter-spacing: 0.5px;
}

/* Cursor */
.cursor {
    display: inline-block;
    width: 10px;
    background: #00ff88;
    margin-left: 5px;
    animation: blink 1s infinite;
}

@keyframes blink {
    0% { opacity: 1; }
    50% { opacity: 0; }
    100% { opacity: 1; }
}

/* Buttons */
.menu {
    margin-top: 15px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

button {
    padding: 12px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: linear-gradient(135deg, #00ffcc, #0099ff);
    color: black;
    font-weight: bold;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px #00ffcc;
}

/* Inputs */
.input-area {
    margin-top: 10px;
}

input {
    width: 200px;
    padding: 8px;
    margin: 5px;
    border-radius: 5px;
    border: none;
}
</style>
</head>

<body>

<div class="container">
    <h1>💼 Employee Payroll</h1>

    <div class="terminal" id="terminal"></div>

    <div class="menu">
        <button onclick="showAdd()">Add</button>
        <button onclick="showUpdate()">Update OT</button>
        <button onclick="showPayslip()">Payslip</button>
        <button onclick="totalPayout()">Total</button>
        <button onclick="highestPaid()">Highest</button>
        <button onclick="exitApp()">Exit</button>
    </div>

    <div class="input-area" id="inputs"></div>
</div>

<script>
let employees = [];
let terminal = document.getElementById("terminal");

/* Typing effect */
function typeText(text, speed = 20) {
    let i = 0;
    let line = document.createElement("div");
    terminal.appendChild(line);

    function typing() {
        if (i < text.length) {
            line.innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, speed);
        } else {
            terminal.scrollTop = terminal.scrollHeight;
        }
    }
    typing();
}

function print(text) {
    typeText(text);
}

function showMenu() {
    print("\n--- Payroll System ---");
    print("1. Add Employee");
    print("2. Update OT");
    print("3. Generate Payslip");
    print("4. Total Payout");
    print("5. Highest Paid");
    print("6. Exit\n");
}

/* Forms */
function showAdd() {
    showMenu();
    print(">> Add Employee");

    document.getElementById("inputs").innerHTML = `
        <input id="id" placeholder="ID">
        <input id="name" placeholder="Name">
        <input id="basic" placeholder="Basic">
        <input id="ot" placeholder="OT">
        <button onclick="addEmployee()">Submit</button>
    `;
}

function showUpdate() {
    showMenu();
    print(">> Update OT");

    document.getElementById("inputs").innerHTML = `
        <input id="id" placeholder="ID">
        <input id="ot" placeholder="New OT">
        <button onclick="updateOT()">Update</button>
    `;
}

function showPayslip() {
    showMenu();
    print(">> Generate Payslip");

    document.getElementById("inputs").innerHTML = `
        <input id="id" placeholder="ID">
        <button onclick="generatePayslip()">Generate</button>
    `;
}

/* Logic */
function addEmployee() {
    let id = document.getElementById("id").value;
    let name = document.getElementById("name").value;
    let basic = parseFloat(document.getElementById("basic").value);
    let ot = parseInt(document.getElementById("ot").value);

    employees.push({id, name, basic, ot});
    print("✔ Employee Added! (ID: " + id + ")", "success");
}

function calculateGross(e) {
    return e.basic + e.ot * 200;
}

function calculateTax(g) {
    if (g < 20000) return g * 0.05;
    else if (g <= 50000) return g * 0.10;
    else return g * 0.20;
}

function generatePayslip() {
    let id = document.getElementById("id").value;
    let e = employees.find(emp => emp.id == id);

    if (!e) {
        print("✖ Employee not found!");
        return;
    }

    let g = calculateGross(e);
    let t = calculateTax(g);
    let n = g - t;

    print("\n--- Payslip ---");
    print("Name: " + e.name);
    print("Gross: " + g);
    print("Tax: " + t);
    print("Net: " + n);
}

function updateOT() {
    let id = document.getElementById("id").value;
    let ot = parseInt(document.getElementById("ot").value);

    let e = employees.find(emp => emp.id == id);

    if (!e) {
        print("✖ Not found!");
        return;
    }

    e.ot = ot;
    print("✔ OT Updated!");
}

function totalPayout() {
    showMenu();

    let total = employees.reduce((sum, e) => {
        let g = calculateGross(e);
        return sum + (g - calculateTax(g));
    }, 0);

    print("💰 Total Payout: " + total);
}

function highestPaid() {
    showMenu();

    if (employees.length === 0) {
        print("No employees!");
        return;
    }

    let max = employees.reduce((a, b) => {
        let na = calculateGross(a) - calculateTax(calculateGross(a));
        let nb = calculateGross(b) - calculateTax(calculateGross(b));
        return na > nb ? a : b;
    });

    print("🏆 Highest Paid: " + max.name);
}

function exitApp() {
    print("Exiting system...");
}

/* Initial */
showMenu();
</script>

</body>
</html>
