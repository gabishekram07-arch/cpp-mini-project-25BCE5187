<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Employee Payroll</title>

<style>
body {
    margin: 0;
    font-family: "Courier New", monospace;
    background: #050505;
    color: #00ff88;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    width: 90%;
    max-width: 1100px;
}

h1 {
    text-align: center;
    color: #00ffcc;
    text-shadow: 0 0 15px #00ffcc;
}

.terminal {
    background: black;
    border: 2px solid #00ff88;
    padding: 20px;
    height: 420px;
    overflow-y: auto;
    border-radius: 12px;
    box-shadow: 0 0 25px #00ff88;
    font-size: 18px;
    line-height: 1.6;
}

.input-line {
    display: flex;
    margin-top: 10px;
}

.prompt {
    margin-right: 5px;
}

input {
    flex: 1;
    background: black;
    border: none;
    color: #00ff88;
    font-size: 18px;
    outline: none;
}

.menu {
    margin-top: 15px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

button {
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(135deg, #00ffcc, #0099ff);
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    transform: scale(1.05);
}

.success { color: #00ffcc; }
.error { color: #ff4d4d; }
.info { color: #00aaff; }

</style>
</head>

<body>

<div class="container">
    <h1>💼 Employee Payroll</h1>

    <div class="terminal" id="terminal"></div>

    <div class="input-line">
        <span class="prompt">></span>
        <input id="commandInput" placeholder="Type command..." onkeydown="handleCommand(event)">
    </div>

    <div class="menu">
        <button onclick="runCmd('add')">Add</button>
        <button onclick="runCmd('update')">Update</button>
        <button onclick="runCmd('payslip')">Payslip</button>
        <button onclick="runCmd('total')">Total</button>
        <button onclick="runCmd('highest')">Highest</button>
        <button onclick="runCmd('list')">List</button>
    </div>
</div>

<script>
let employees = JSON.parse(localStorage.getItem("employees")) || [];
const terminal = document.getElementById("terminal");

/* Typing print */
function print(text, type="") {
    let line = document.createElement("div");
    line.className = type;
    terminal.appendChild(line);

    let i = 0;
    function typeWriter() {
        if (i < text.length) {
            line.innerHTML += text[i++];
            setTimeout(typeWriter, 15);
        }
    }
    typeWriter();
    terminal.scrollTop = terminal.scrollHeight;
}

/* Handle input */
function handleCommand(e) {
    if (e.key === "Enter") {
        let cmd = e.target.value.trim();
        print("> " + cmd, "info");
        execute(cmd);
        e.target.value = "";
    }
}

function runCmd(cmd) {
    print("> " + cmd, "info");
    execute(cmd);
}

/* Commands */
function execute(cmd) {
    switch(cmd.toLowerCase()) {

        case "add":
            let id = prompt("Enter Employee ID:");
            let name = prompt("Enter Name:");
            let basic = parseFloat(prompt("Enter Basic Pay:"));
            let ot = parseInt(prompt("Enter OT Hours:"));

            if (!id || !name || isNaN(basic) || isNaN(ot)) {
                print("Invalid input!", "error");
                return;
            }

            employees.push({id, name, basic, ot});
            save();

            /* ✅ UPDATED LINE */
            print(`✔ Employee Added! (ID: ${id}, Name: ${name})`, "success");
            break;

        case "update":
            let uid = prompt("Enter ID:");
            let emp = employees.find(e => e.id == uid);

            if (!emp) {
                print("Employee not found!", "error");
                return;
            }

            emp.ot = parseInt(prompt("Enter New OT:"));
            save();
            print("✔ OT Updated!", "success");
            break;

        case "payslip":
            let pid = prompt("Enter ID:");
            let e = employees.find(x => x.id == pid);

            if (!e) {
                print("Employee not found!", "error");
                return;
            }

            let g = e.basic + e.ot * 200;
            let t = g < 20000 ? g * 0.05 : g <= 50000 ? g * 0.10 : g * 0.20;

            print("--- Payslip ---");
            print("Name: " + e.name);
            print("Gross: " + g);
            print("Tax: " + t);
            print("Net: " + (g - t), "success");
            break;

        case "total":
            let total = employees.reduce((s,e)=>{
                let g = e.basic + e.ot * 200;
                let t = g < 20000 ? g * 0.05 : g <= 50000 ? g * 0.10 : g * 0.20;
                return s + (g - t);
            },0);

            print("💰 Total Payout: " + total, "success");
            break;

        case "highest":
            if (!employees.length) {
                print("No employees!", "error");
                return;
            }

            let max = employees.reduce((a,b)=>{
                let na = a.basic + a.ot * 200;
                let nb = b.basic + b.ot * 200;
                return na > nb ? a : b;
            });

            print("🏆 Highest Paid: " + max.name + " (ID: " + max.id + ")", "success");
            break;

        case "list":
            if (!employees.length) {
                print("No employees!", "error");
                return;
            }

            print("--- Employee List ---");
            employees.forEach(e=>{
                print(`ID: ${e.id} | Name: ${e.name} | Basic: ${e.basic}`);
            });
            break;

        case "clear":
            terminal.innerHTML = "";
            break;

        case "help":
            print("Commands: add, update, payslip, total, highest, list, clear");
            break;

        default:
            print("Unknown command (type 'help')", "error");
    }
}

/* Save to storage */
function save() {
    localStorage.setItem("employees", JSON.stringify(employees));
}

/* Initial */
print("Welcome to Employee Payroll System", "success");
print("Type 'help' to see commands\n", "info");
</script>

</body>
</html>
