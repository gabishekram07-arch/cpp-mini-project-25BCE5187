<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Payroll System</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        width: 600px;
        padding: 30px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(15px);
        box-shadow: 0 0 25px rgba(0, 255, 200, 0.4);
        text-align: center;
    }

    h1 {
        margin-bottom: 20px;
        font-size: 32px;
        background: linear-gradient(90deg, #00ffcc, #00ffff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .menu {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
        margin-bottom: 20px;
    }

    button {
        padding: 15px;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        cursor: pointer;
        background: linear-gradient(135deg, #00c6ff, #0072ff);
        color: white;
        transition: 0.3s;
        box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
    }

    button:hover {
        transform: scale(1.05);
        box-shadow: 0 0 20px rgba(0, 255, 255, 0.9);
    }

    .input-section {
        margin-top: 20px;
    }

    input {
        width: 90%;
        padding: 10px;
        margin: 8px 0;
        border-radius: 8px;
        border: none;
        outline: none;
        font-size: 15px;
    }

    .output {
        margin-top: 20px;
        padding: 15px;
        background: rgba(0,0,0,0.4);
        border-radius: 10px;
        min-height: 50px;
    }

    .exit {
        background: linear-gradient(135deg, #ff4e50, #f00000);
    }
</style>
</head>

<body>

<div class="container">
    <h1>💼 Payroll System</h1>

    <div class="menu">
        <button onclick="showForm('add')">Add Employee</button>
        <button onclick="showForm('update')">Update OT</button>
        <button onclick="showForm('payslip')">Generate Payslip</button>
        <button onclick="showForm('total')">Total Payout</button>
        <button onclick="showForm('highest')">Highest Paid</button>
        <button class="exit" onclick="exitApp()">Exit</button>
    </div>

    <div class="input-section" id="formArea"></div>

    <div class="output" id="output">Output will appear here...</div>
</div>

<script>
let employees = [];

function showForm(type) {
    let form = document.getElementById("formArea");

    if (type === "add") {
        form.innerHTML = `
            <input id="id" placeholder="Employee ID"><br>
            <input id="name" placeholder="Name"><br>
            <input id="basic" placeholder="Basic Pay"><br>
            <input id="ot" placeholder="OT Hours"><br>
            <button onclick="addEmployee()">Submit</button>
        `;
    }
    else if (type === "update") {
        form.innerHTML = `
            <input id="id" placeholder="Employee ID"><br>
            <input id="ot" placeholder="New OT"><br>
            <button onclick="updateOT()">Update</button>
        `;
    }
    else if (type === "payslip") {
        form.innerHTML = `
            <input id="id" placeholder="Employee ID"><br>
            <button onclick="generatePayslip()">Generate</button>
        `;
    }
    else if (type === "total") {
        totalPayout();
    }
    else if (type === "highest") {
        highestPaid();
    }
}

function addEmployee() {
    let id = document.getElementById("id").value;
    let name = document.getElementById("name").value;
    let basic = parseFloat(document.getElementById("basic").value);
    let ot = parseInt(document.getElementById("ot").value);

    employees.push({id, name, basic, ot});
    document.getElementById("output").innerHTML = "✅ Employee Added!";
}

function calculateGross(e) {
    return e.basic + (e.ot * 200);
}

function calculateTax(g) {
    if (g < 20000) return g * 0.05;
    else if (g <= 50000) return g * 0.10;
    else return g * 0.20;
}

function generatePayslip() {
    let id = document.getElementById("id").value;
    let e = employees.find(emp => emp.id == id);

    if (!e) {
        document.getElementById("output").innerHTML = "❌ Employee not found!";
        return;
    }

    let gross = calculateGross(e);
    let tax = calculateTax(gross);
    let net = gross - tax;

    document.getElementById("output").innerHTML = `
        <b>Payslip</b><br>
        Name: ${e.name}<br>
        Gross: ${gross}<br>
        Tax: ${tax}<br>
        Net: ${net}
    `;
}

function updateOT() {
    let id = document.getElementById("id").value;
    let ot = parseInt(document.getElementById("ot").value);

    let e = employees.find(emp => emp.id == id);

    if (!e) {
        document.getElementById("output").innerHTML = "❌ Not found!";
        return;
    }

    e.ot = ot;
    document.getElementById("output").innerHTML = "✅ OT Updated!";
}

function totalPayout() {
    let total = employees.reduce((sum, e) => {
        let net = calculateGross(e) - calculateTax(calculateGross(e));
        return sum + net;
    }, 0);

    document.getElementById("output").innerHTML = "💰 Total Payout: " + total;
}

function highestPaid() {
    if (employees.length === 0) {
        document.getElementById("output").innerHTML = "No employees!";
        return;
    }

    let max = employees.reduce((a, b) => {
        let netA = calculateGross(a) - calculateTax(calculateGross(a));
        let netB = calculateGross(b) - calculateTax(calculateGross(b));
        return netA > netB ? a : b;
    });

    document.getElementById("output").innerHTML = `
        🏆 Highest Paid<br>
        Name: ${max.name}
    `;
}

function exitApp() {
    document.getElementById("output").innerHTML = "👋 Exiting...";
}
</script>

</body>
</html>
