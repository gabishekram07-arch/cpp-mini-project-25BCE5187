<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Payroll System</title>

<style>
    body {
        font-family: Arial;
        background: #f4f6f9;
        padding: 30px;
    }
    .container {
        max-width: 900px;
        margin: auto;
    }
    .card {
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        margin-bottom: 20px;
    }
    input, button {
        padding: 10px;
        margin: 5px;
    }
    button {
        background: #007bff;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }
    button:hover {
        background: #0056b3;
    }
    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
    }
    th, td {
        border: 1px solid #ddd;
        padding: 8px;
        text-align: center;
    }
    th {
        background: #007bff;
        color: white;
    }
    #output {
        background: #eef;
        padding: 10px;
        margin-top: 10px;
        border-radius: 8px;
        white-space: pre-line;
    }
</style>
</head>

<body>

<div class="container">

    <div class="card">
        <h2>Employee Entry</h2>
        <input type="number" id="id" placeholder="Employee ID">
        <input type="text" id="name" placeholder="Name">
        <input type="number" id="basic" placeholder="Basic Pay">
        <input type="number" id="ot" placeholder="OT Hours">

        <br>
        <button onclick="addEmployee()">Add</button>
        <button onclick="updateOT()">Update OT</button>
        <button onclick="generatePayslip()">Payslip</button>
        <button onclick="totalPayout()">Total Payout</button>
        <button onclick="highestPaid()">Highest Paid</button>
        <button onclick="clearData()">Clear All</button>

        <div id="output"></div>
    </div>

    <div class="card">
        <h2>Employee List</h2>
        <table id="table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Basic</th>
                    <th>OT</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

</div>

<script>
let employees = JSON.parse(localStorage.getItem("employees")) || [];
const otRate = 200;

// Save to localStorage
function saveData() {
    localStorage.setItem("employees", JSON.stringify(employees));
}

// Refresh table
function renderTable() {
    let tbody = document.querySelector("#table tbody");
    tbody.innerHTML = "";

    employees.forEach(e => {
        let row = `<tr>
            <td>${e.id}</td>
            <td>${e.name}</td>
            <td>${e.basic}</td>
            <td>${e.ot}</td>
        </tr>`;
        tbody.innerHTML += row;
    });
}

// Add employee
function addEmployee() {
    let id = document.getElementById("id").value;
    let name = document.getElementById("name").value;
    let basic = parseFloat(document.getElementById("basic").value);
    let ot = parseInt(document.getElementById("ot").value);

    if (!id || !name || basic < 0 || ot < 0) {
        return log("Invalid input!");
    }

    if (employees.find(e => e.id == id)) {
        return log("EmpID exists!");
    }

    employees.push({id, name, basic, ot});
    saveData();
    renderTable();
    log("Employee added!");
}

// Update OT
function updateOT() {
    let id = document.getElementById("id").value;
    let ot = parseInt(document.getElementById("ot").value);

    let emp = employees.find(e => e.id == id);
    if (!emp) return log("Employee not found!");

    emp.ot = ot;
    saveData();
    renderTable();
    log("OT updated!");
}

// Salary logic
function gross(e) { return e.basic + e.ot * otRate; }
function tax(g) {
    if (g < 20000) return g * 0.05;
    if (g <= 50000) return g * 0.10;
    return g * 0.20;
}

// Payslip
function generatePayslip() {
    let id = document.getElementById("id").value;
    let e = employees.find(x => x.id == id);

    if (!e) return log("Not found!");

    let g = gross(e);
    let t = tax(g);
    let n = g - t;

    log(`--- Salary Slip ---
ID: ${e.id}
Name: ${e.name}
Gross: ${g}
Tax: ${t}
Net: ${n}`);
}

// Total payout
function totalPayout() {
    let total = employees.reduce((sum, e) => {
        let g = gross(e);
        return sum + (g - tax(g));
    }, 0);

    log("Total payout: " + total);
}

// Highest paid
function highestPaid() {
    if (employees.length === 0) return log("No employees!");

    let max = employees[0];
    let maxNet = gross(max) - tax(gross(max));

    employees.forEach(e => {
        let net = gross(e) - tax(gross(e));
        if (net > maxNet) {
            max = e;
            maxNet = net;
        }
    });

    log(`Highest Paid: ${max.name} (Net: ${maxNet})`);
}

// Clear data
function clearData() {
    if (!confirm("Delete all data?")) return;

    employees = [];
    saveData();
    renderTable();
    log("All data cleared!");
}

// Output
function log(msg) {
    document.getElementById("output").innerText = msg;
}

// Load on start
renderTable();
</script>

</body>
</html>
